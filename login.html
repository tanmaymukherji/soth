<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — SoTH</title>
<link rel="stylesheet" href="styles/app.css?v=20260721">
<script src="config.js?v=20260721"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
  onload="window.dispatchEvent(new Event('supabaseReady'))"></script>
<script src="data/lgd.js?v=20260721"></script>
<script src="app/core.js?v=20260721"></script>
</head>
<body>
<div id="toast-container"></div>

<header class="app-header">
  <div class="brand">Sense of <span>The House</span></div>
  <nav><a href="index.html">← Back to Map</a></nav>
</header>

<main class="auth-container">
  <div class="auth-card" id="auth-card">
    <h2 id="auth-title">Sign In</h2>
    <div id="auth-form">
      <div class="field-group">
        <label for="auth-email">Email</label>
        <input type="email" id="auth-email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="field-group" id="password-group">
        <label for="auth-password">Password</label>
        <input type="password" id="auth-password" placeholder="Enter password" autocomplete="current-password">
      </div>
      <div class="field-group" id="name-group" style="display:none;">
        <label for="auth-name">Full Name</label>
        <input type="text" id="auth-name" placeholder="Your name" autocomplete="name">
      </div>
      <button class="btn btn-primary" style="width:100%;" id="auth-action-btn">Sign In</button>
    </div>
    <div class="form-footer" id="auth-footer">
      <a href="#" id="auth-toggle" onclick="toggleMode()">Create an account</a>
      <span style="margin:0 8px">·</span>
      <a href="#" onclick="forgotPassword()">Forgot password?</a>
    </div>
  </div>
</main>

<script>
let mode = 'login';

function toggleMode() {
  mode = mode === 'login' ? 'signup' : 'login';
  document.getElementById('auth-title').textContent = mode === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('auth-action-btn').textContent = mode === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('name-group').style.display = mode === 'signup' ? 'block' : 'none';
  document.getElementById('auth-toggle').textContent = mode === 'login' ? 'Create an account' : 'Already have an account? Sign in';
  document.getElementById('auth-footer').querySelector('a:last-child').style.display = mode === 'login' ? '' : 'none';
}

document.getElementById('auth-action-btn').addEventListener('click', async function () {
  try {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const name = document.getElementById('auth-name').value.trim();

    if (!email || !password) {
      soth.ui.showToast('Email and password are required', 'error');
      return;
    }

    if (!soth.sb()) {
      soth.ui.showToast('Supabase not configured. Check config.js settings.', 'error');
      return;
    }

    if (mode === 'login') {
      const result = await soth.auth.signIn(email, password);
      if (result.error) {
        soth.ui.showToast(result.error.message, 'error');
      } else {
        window.location.href = 'dashboard.html';
      }
    } else {
      if (password.length < 6) {
        soth.ui.showToast('Password must be at least 6 characters', 'error');
        return;
      }
      const result = await soth.auth.signUp(email, password, name);
      if (result.error) {
        soth.ui.showToast(result.error.message, 'error');
      } else {
        soth.ui.showToast('Account created! Check your email for confirmation link.', 'success');
      }
    }
  } catch (e) {
    soth.ui.showToast('Error: ' + (e.message || 'Unknown error'), 'error');
    console.error('Login error:', e);
  }
});

async function forgotPassword() {
  const email = document.getElementById('auth-email').value.trim();
  if (!email) {
    soth.ui.showToast('Enter your email first', 'error');
    return;
  }
  const { error } = await soth.auth.sendPasswordReset(email);
  if (error) {
    soth.ui.showToast(error.message, 'error');
  } else {
    soth.ui.showToast('Password reset email sent!', 'success');
  }
}

// Handle password recovery redirect
(async function () {
  await soth.auth.init();
  const hash = window.location.hash;
  if (hash && hash.includes('type=recovery')) {
    const newPw = prompt('Enter your new password (6+ characters):');
    if (newPw && newPw.length >= 6) {
      const { error } = await soth.auth.updatePassword(newPw);
      if (error) {
        soth.ui.showToast(error.message, 'error');
      } else {
        soth.ui.showToast('Password updated! You can now sign in.', 'success');
      }
    }
  }
  if (soth.currentUser) {
    window.location.href = 'dashboard.html';
  }
})();
</script>
</body>
</html>
